services:
  mysql8:
    image: mysql:8.4
    container_name: portfolio-mysql8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dsc111march03
      MYSQL_DATABASE: portfolio
      MYSQL_USER: carsh0712
      MYSQL_PASSWORD: dsc111march03
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - portfolio_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    image: python:3.14-slim
    container_name: portfolio-backend
    restart: unless-stopped
    working_dir: /app
    environment:
      APP_ENV: development
      SERVER_CODE: PORTFOLIO_API
      MYSQL_HOST: mysql8
      MYSQL_PORT: "3306"
      MYSQL_DB: portfolio
      MYSQL_USER: carsh0712
      MYSQL_PASSWORD: dsc111march03
      JWT_SECRET_KEY: change-this-to-a-long-random-secret
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /app/uploads
      CLIENT_DIST_DIR: /app/../portfolio_project_client_vite/dist
      MANUAL_PUBLIC: "false"
      MAX_FILE_SIZE: "10485760"
      DB_MAX_RETRIES: "20"
      DB_RETRY_DELAY: "3"
      DB_POOL_RECYCLE: "1800"
      DB_SQL_ECHO: "false"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./portfolio_project_server_flask:/app
      - portfolio_uploads:/app/uploads
    depends_on:
      mysql8:
        condition: service_healthy
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt
      && python app.py"

  frontend:
    image: node:22-alpine
    container_name: portfolio-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./portfolio_project_client_vite:/app
      - portfolio_frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "npm install
      && npm run dev -- --host 0.0.0.0"

volumes:
  portfolio_mysql_data:
  portfolio_uploads:
  portfolio_frontend_node_modules:
